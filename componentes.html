<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI kit</title>
    <link rel="icon" href="img/logos/favicon.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- CSS FILES -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="container">
        <div class="mb-5">
            <h1 class="display_1">UI Kit</h1>
            <h2 class="headline_1">Iconos</h2>

            <ion-icon name="heart"></ion-icon> <!--filled-->
            <ion-icon name="heart-outline"></ion-icon> <!--outline-->
            <ion-icon name="heart-sharp"></ion-icon> <!--sharp-->
            <ion-icon name="american-football-outline"></ion-icon>
        </div>


        <!-- Buttons -->
        <div class="mb-5">
            <h2 class="headline_1">Botones</h2>

            <button type="button" class="btn primary-btn">
                <ion-icon name="arrow-back"></ion-icon>
                Primary
                <ion-icon name="arrow-forward"></ion-icon>
            </button>

            <button type="button" class="btn primary-btn" disabled>
                <ion-icon name="arrow-back"></ion-icon>
                Primary
                <ion-icon name="arrow-forward"></ion-icon>
            </button>

            <button type="button" class="btn outline-btn">
                <ion-icon name="arrow-back"></ion-icon>
                Primary
                <ion-icon name="arrow-forward"></ion-icon>
            </button>

            <button type="button" class="btn outline-btn" disabled>
                <ion-icon name="arrow-back"></ion-icon>
                Primary
                <ion-icon name="arrow-forward"></ion-icon>
            </button>
        </div>
        <!-- End buttons -->

        <!-- Links -->
        <div class="mb-5">
            <h2 class="headline_2 mb-2">links</h2>

            <a href="#" class="link-primary">
                link primary
            </a>

            <a href="#" class="link-primary link-disabled" disabled>
                link primary disabled
            </a>

            <a href="#" class="link-secondary">
                link secondary
            </a>

            <a href="#" class="link-secondary link-disabled" disabled>
                link secondary disabled
            </a>
        </div>
        <!-- End links -->

        <!-- Inputs -->
        <div class="mb-5">
            <h2 class="headline_2 mb-2">Inputs</h2>

            <form class="row g-3 needs-validation" novalidate>
                <div class="col-md-4">
                    <label for="validationCustom01" class="form-label">First name</label>
                    <input type="text" class="form-control" id="validationCustom01" value="Mark" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="validationCustom02" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="validationCustom02" value="Otto" required disabled readonly>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="validationCustomUsername" class="form-label">Username</label>
                    <div class="input-group has-validation">
                        <span class="input-group-text" id="inputGroupPrepend">@</span>
                        <input type="text" class="form-control" id="validationCustomUsername"
                            aria-describedby="inputGroupPrepend" required>
                        <div class="invalid-feedback">
                            Please choose a username.
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="validationCustom03" class="form-label">City</label>
                    <input type="text" class="form-control" id="validationCustom03" required>
                    <div class="invalid-feedback">
                        Please provide a valid city.
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="validationCustom04" class="form-label">State</label>
                    <select class="form-select" id="validationCustom04" required>
                        <option selected disabled value="">Choose...</option>
                        <option>...</option>
                    </select>
                    <div class="invalid-feedback">
                        Please select a valid state.
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="validationCustom05" class="form-label">Zip</label>
                    <input type="text" class="form-control" id="validationCustom05" required>
                    <div class="invalid-feedback">
                        Please provide a valid zip.
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                        <label class="form-check-label" for="invalidCheck">
                            Agree to terms and conditions
                        </label>
                        <div class="invalid-feedback">
                            You must agree before submitting.
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Submit form</button>
                </div>
            </form>
        </div>
        <!-- End inputs-->
    </div>

    <!-- Js-files -->
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
