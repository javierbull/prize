<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI kit</title>
    <link rel="icon" href="img/logos/favicon.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- CSS FILES -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="container">
        <h1 class="display_1">UI Kit</h1>

        <div class="mb-5">
            <h2 class="headline_1">Iconos</h2>
        
            <ion-icon name="heart"></ion-icon> <!--filled-->
            <ion-icon name="heart-outline"></ion-icon> <!--outline-->
            <ion-icon name="heart-sharp"></ion-icon> <!--sharp-->
            <ion-icon name="american-football-outline"></ion-icon>
        </div>
    

        <h2 class="headline_1">Botones</h2>
        
        <button type="button" class="btn primary-btn">
            <ion-icon name="arrow-back"></ion-icon>
            Primary
            <ion-icon name="arrow-forward"></ion-icon>
        </button>

        <button type="button" class="btn primary-btn" disabled>
            <ion-icon name="arrow-back"></ion-icon>
            Primary
            <ion-icon name="arrow-forward"></ion-icon>
        </button>

        <button type="button" class="btn outline-btn">
            <ion-icon name="arrow-back"></ion-icon>
            Primary
            <ion-icon name="arrow-forward"></ion-icon>
        </button>

        <button type="button" class="btn outline-btn" disabled>
            <ion-icon name="arrow-back"></ion-icon>
            Primary
            <ion-icon name="arrow-forward"></ion-icon>
        </button>
    </div>

    <!-- Js-files -->
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
